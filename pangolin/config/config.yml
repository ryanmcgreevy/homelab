# To see all available options, please visit the docs:
# https://docs.fossorial.io/Pangolin/Configuration/config

app:
    dashboard_url: "https://pangolin-aws.rmcgreevy.com"
    log_level: "info"

domains:
    domain1:
        base_domain: "rmcgreevy.com"
        cert_resolver: "letsencrypt"

server:
    #secret:
    maxmind_db_path: "./config/GeoLite2-Country.mmdb" 
    cors:
        origins: ["https://pangolin-aws.rmcgreevy.com"]
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        allowed_headers: ["X-CSRF-Token", "Content-Type"]
        credentials: false

gerbil:
    start_port: 51820
    base_endpoint: "pangolin-aws.rmcgreevy.com"

orgs:
    block_size: 24
    subnet_group: 100.89.138.0/20


email:
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    #smtp_user:
    #smtp_pass:
    no_reply: "ryanmcgreevy@gmail.com"


flags:
    require_email_verification: true
    disable_signup_without_invite: true
    disable_user_create_org: false
    allow_raw_resources: true
